<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f4f4f9;
            padding: 50px;
        }
        .profile-card {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #007BFF;
            padding-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2>个人名片</h2>
        <p><strong>姓名：</strong> 你的名字</p>
        <p><strong>年龄：</strong> 18岁</p>
        <p><strong>职业：</strong> 编程新手村勇者</p>
        <p><strong>爱好：</strong> 探索代码世界、听音乐、旅行</p>
        <p><strong>个性签名：</strong> 每天进步一点点！</p>
    </div>

    <script>
        // alert() 就是用来触发浏览器原生弹窗的指令
        alert("你好！欢迎来到我的个人主页，点击【确定】查看我的详细信息吧！");
    </script>

</body>
</html>
